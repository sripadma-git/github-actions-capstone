name: Main Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # 🔹 1. Build & Test
  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      python_version: "3.11"

  # 🔹 2. Docker Build & Push
  docker:
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: sripadma996/github-actions-app
      tag: latest
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  # 🔹 3. Security Scan (DevSecOps)
  security-scan:
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fix: ensure image is available before scan
      - name: Wait for image availability
        run: sleep 10

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'sripadma996/github-actions-app:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

  # 🔹 4. Deploy to EC2
  deploy:
    needs: security-scan
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "🚀 Starting deployment..."

            # Pull latest image
            docker pull sripadma996/github-actions-app:latest

            # Stop old container (if exists)
            docker stop app || true

            # Remove old container (if exists)
            docker rm app || true

            # Run new container
            docker run -d -p 5000:5000 --name app sripadma996/github-actions-app:latest

            echo "✅ Deployment complete"