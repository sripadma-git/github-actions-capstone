name: Health Check

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest

    steps:
      - name: Pull Image
        run: docker pull your-dockerhub-username/github-actions-app:latest

      - name: Run Container
        run: docker run -d -p 5000:5000 --name test-app sripadma996/github-actions-app:latest

      - run: sleep 5

      - name: Check Health
        run: curl http://localhost:5000/health

      - name: Cleanup
        run: docker rm -f test-app

      - name: Summary
        run: |
          echo "## Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "- Status: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date)" >> $GITHUB_STEP_SUMMARY